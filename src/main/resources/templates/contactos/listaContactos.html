<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/mainlayout}">
<head>
    <title>Lista de Contactos</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/modules/module-list.css}">
</head>
<body>
<main layout:fragment="content" class="page">
    <div class="page-header">
        <div>
            <h2>Lista de Contactos</h2>
            <p>Administra los contactos registrados.</p>
        </div>
        <a th:href="@{/contactos/nuevo}" class="boton-secondary bg-success">
            <span class="boton-icon">
                <i class="ri-add-line"></i>
            </span>
            <span class="boton-text">
                Nuevo contacto
            </span>
        </a>
    </div>
    <section class="card">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="contacto : ${contactos}">
                <td th:text="${contacto.id}"></td>
                <td th:text="${contacto.nombre}"></td>
                <td th:text="${contacto.email}"></td>
                <td th:text="${contacto.telefono}"></td>
                <td>
                    <div class="table-actions ">
                        <a th:href="@{/contactos/{id}/editar(id=${contacto.id})}" class="boton-secondary bg-warning">
                            <span class="boton-icon">
                                <i class="ri-pencil-line"></i>
                            </span>
                            <span class="boton-text">
                                Editar
                            </span>
                        </a>
                        <a th:href="@{/contactos/{id}/eliminar(id=${contacto.id})}" class="boton-secondary bg-danger">
                            <span class="boton-icon">
                                <i class="ri-delete-bin-line"></i>
                            </span>
                            <span class="boton-text">
                                Eliminar
                            </span>
                        </a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
